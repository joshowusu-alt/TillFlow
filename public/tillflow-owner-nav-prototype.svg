    <text x="226" y="704" class="nav">Reports</text>
    <text x="315" y="704" class="navActive">More</text>
    <rect x="304" y="620" width="56" height="30" rx="15" fill="#2348B8"/>
    <text x="322" y="640" class="hot">1</text>
    <text x="238" y="643" class="hotText">Tap More</text>
