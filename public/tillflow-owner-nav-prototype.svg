    <text x="79" y="487" class="body">Stock</text><text x="276" y="487" class="muted">></text>
    <rect x="58" y="514" width="278" height="48" rx="14" fill="#F9FAFC" stroke="#E8ECF3"/>
    <text x="79" y="543" class="body">Money</text><text x="276" y="543" class="muted">></text>
    <rect x="58" y="570" width="278" height="48" rx="14" fill="#F2F6FF" stroke="#BFD0FF"/>
    <text x="79" y="599" class="body" fill="#2348B8">Reports</text><text x="276" y="599" class="muted">v</text>
    <rect x="78" y="626" width="238" height="36" rx="12" fill="#FFFFFF" stroke="#E5E9F2"/>
    <text x="96" y="649" class="body">Command Center</text><rect x="250" y="635" width="47" height="20" rx="10" fill="#EAF0FF"/><text x="260" y="649" font-family="Inter,system-ui" font-size="9" font-weight="800" fill="#2348B8">Today</text>
    <rect x="78" y="669" width="238" height="36" rx="12" fill="#FFFFFF" stroke="#E5E9F2"/>
    <text x="96" y="692" class="body">Trading Report</text><rect x="254" y="678" width="43" height="20" rx="10" fill="#F1F5F9"/><text x="266" y="692" font-family="Inter,system-ui" font-size="9" font-weight="800" fill="#64748B">7d</text>
    <rect x="78" y="712" width="238" height="36" rx="12" fill="#EAF0FF" stroke="#BFD0FF"/>
    <text x="96" y="735" class="body" fill="#2348B8">Sales Analytics</text><rect x="254" y="721" width="43" height="20" rx="10" fill="#FFFFFF"/><text x="265" y="735" font-family="Inter,system-ui" font-size="9" font-weight="800" fill="#2348B8">90d</text>
