      <text x="79" y="622" class="body" fill="#2348B8">Reports</text><text x="276" y="622" class="muted">v</text>
      <rect x="236" y="579" width="72" height="28" rx="14" fill="#2348B8"/>
      <text x="249" y="597" class="hot">2</text>
      <text x="272" y="598" class="hot" font-size="10">EXPAND</text>
    </g>
    <text x="58" y="680" class="tiny">RECENT</text>
