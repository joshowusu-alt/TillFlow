<svg width="1500" height="980" viewBox="0 0 1500 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#101828" flood-opacity="0.14"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#101828" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="heroBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102E92"/>
      <stop offset="1" stop-color="#2856D6"/>
    </linearGradient>
    <linearGradient id="bgBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6F8FF"/>
      <stop offset="1" stop-color="#EEF3FF"/>
    </linearGradient>
    <style>
      .title { font: 700 34px Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .state { font: 800 14px Inter, system-ui, sans-serif; letter-spacing: 3px; fill: #2348B8; }
      .tiny { font: 600 11px Inter, system-ui, sans-serif; letter-spacing: 2px; fill: #8A94A6; }
      .label { font: 700 14px Inter, system-ui, sans-serif; fill: #172033; }
      .muted { font: 500 12px Inter, system-ui, sans-serif; fill: #747B8A; }
      .body { font: 600 14px Inter, system-ui, sans-serif; fill: #2C3445; }
      .kpi { font: 800 22px Inter, system-ui, sans-serif; fill: #FFFFFF; }
      .nav { font: 600 11px Inter, system-ui, sans-serif; fill: #5B6575; }
      .navActive { font: 800 11px Inter, system-ui, sans-serif; fill: #2348B8; }
      .hot { font: 800 13px Inter, system-ui, sans-serif; fill: #FFFFFF; }
      .hotText { font: 700 12px Inter, system-ui, sans-serif; fill: #2348B8; }
    </style>
  </defs>

  <rect width="1500" height="980" fill="#F3F5F9"/>
  <text x="70" y="66" class="title">TillFlow Owner Mobile Navigation - Interactive Review</text>
  <text x="70" y="96" class="muted">Three tap states for the owner experience: Home, More menu, Reports expanded.</text>

  <!-- Screen labels -->
  <text x="110" y="145" class="state">1 HOME STATE</text>
  <text x="565" y="145" class="state">2 MENU OPEN</text>
  <text x="1020" y="145" class="state">3 REPORTS EXPANDED</text>

  <!-- Phone 1 -->
  <g transform="translate(70 165)">
    <rect x="0" y="0" width="390" height="760" rx="38" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="16" y="18" width="358" height="724" rx="30" fill="url(#bgBlue)"/>
    <text x="42" y="52" font-family="Inter,system-ui" font-size="18" font-weight="800" fill="#111827">02:15</text>
    <circle cx="319" cy="45" r="4" fill="#111827"/>
    <rect x="336" y="38" width="22" height="13" rx="4" stroke="#111827" stroke-width="2"/>
    <text x="42" y="105" font-family="Inter,system-ui" font-size="24" font-weight="900" fill="#2348B8">TillFlow</text>
    <rect x="42" y="130" width="112" height="34" rx="17" fill="#FFFFFF" stroke="#E3E7EF"/>
    <circle cx="61" cy="147" r="5" fill="#2348B8"/>
    <text x="76" y="152" class="muted">Main Branch</text>
    <rect x="165" y="130" width="110" height="34" rx="17" fill="#DDFBEA"/>
    <text x="184" y="152" font-family="Inter,system-ui" font-size="11" font-weight="900" letter-spacing="2" fill="#00875A">SYNC READY</text>

    <rect x="42" y="188" width="306" height="430" rx="22" fill="url(#heroBlue)" filter="url(#soft)"/>
    <text x="68" y="230" class="tiny" fill="#BFD0FF">GOOD MORNING, AKOSUA</text>
    <text x="68" y="266" font-family="Inter,system-ui" font-size="27" font-weight="900" fill="#FFFFFF">EL-SHADDAI</text>
    <text x="68" y="300" font-family="Inter,system-ui" font-size="27" font-weight="900" fill="#FFFFFF">SUPERMARKET</text>
    <text x="68" y="331" font-family="Inter,system-ui" font-size="14" font-weight="600" fill="#C8D6FF">Command center is ready for follow-up.</text>
    <rect x="68" y="356" width="162" height="31" rx="16" fill="#FFFFFF" opacity="0.16" stroke="#FFFFFF" stroke-opacity="0.25"/>
