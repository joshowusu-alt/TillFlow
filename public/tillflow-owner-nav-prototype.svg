    <text x="100" y="143" font-family="Inter,system-ui" font-size="17" font-weight="850" fill="#172033">Akosua Mensah</text>
    <text x="100" y="164" class="tiny">OWNER - MAIN BRANCH</text>
    <rect x="279" y="126" width="60" height="28" rx="14" fill="#DDFBEA"/>
