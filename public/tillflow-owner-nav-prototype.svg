    <text x="86" y="252" font-family="Inter,system-ui" font-size="15" font-weight="850" fill="#FFFFFF">Open POS</text>
    <text x="250" y="252" font-family="Inter,system-ui" font-size="16" font-weight="800" fill="#C8D6FF">></text>
    <rect x="58" y="292" width="278" height="52" rx="16" fill="#FFF8DE" stroke="#F3D675"/>
