<svg width="430" height="932" viewBox="0 0 430 932" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#101828" flood-opacity="0.18"/>
    </filter>
    <style>
      .tiny { font: 700 10px -apple-system, Inter, sans-serif; letter-spacing: 2px; fill: #8A94A6; }
      .label { font: 700 14px -apple-system, Inter, sans-serif; fill: #172033; }
      .muted { font: 500 11px -apple-system, Inter, sans-serif; fill: #747B8A; }
      .body { font: 600 14px -apple-system, Inter, sans-serif; fill: #2C3445; }
    </style>
  </defs>

  <rect width="430" height="932" fill="#FFFFFF"/>

  <!-- Status bar -->
  <text x="30" y="40" font-family="-apple-system,Inter" font-size="16" font-weight="800" fill="#111827">02:15</text>
  <circle cx="366" cy="34" r="3.5" fill="#111827"/>
  <rect x="382" y="27" width="20" height="12" rx="3" stroke="#111827" stroke-width="2"/>

  <!-- Blurred background hint of home screen -->
  <rect x="0" y="60" width="430" height="90" fill="#DCE3F5" opacity="0.6"/>

  <!-- Sheet -->
  <rect x="10" y="86" width="410" height="820" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="195" y="106" width="40" height="5" rx="2.5" fill="#D8DCE4"/>

  <!-- User row -->
  <circle cx="60" cy="152" r="24" fill="#EAF0FF"/>
  <text x="48" y="158" font-family="-apple-system,Inter" font-size="14" font-weight="900" fill="#2348B8">AK</text>
  <text x="96" y="148" font-family="-apple-system,Inter" font-size="17" font-weight="800" fill="#172033">Akosua Mensah</text>
  <text x="96" y="167" class="tiny">OWNER · MAIN BRANCH</text>
  <rect x="340" y="132" width="62" height="28" rx="14" fill="#DDFBEA"/>
  <text x="352" y="150" font-family="-apple-system,Inter" font-size="10" font-weight="900" letter-spacing="1.5" fill="#00875A">ONLINE</text>

  <line x1="34" y1="188" x2="396" y2="188" stroke="#EEF0F4"/>

  <!-- Quick actions -->
  <text x="34" y="216" class="tiny">QUICK ACTIONS</text>

  <rect x="34" y="230" width="172" height="86" rx="18" fill="#2348B8"/>
  <text x="54" y="264" font-family="-apple-system,Inter" font-size="16" font-weight="800" fill="#FFFFFF">Open POS</text>
  <text x="54" y="286" font-family="-apple-system,Inter" font-size="12" font-weight="600" fill="#C8D6FF">Start selling</text>

  <rect x="222" y="230" width="174" height="86" rx="18" fill="#FFF8DE" stroke="#F3D675"/>
  <text x="242" y="264" class="label" fill="#7A4B00">4 issues</text>
  <text x="242" y="286" font-family="-apple-system,Inter" font-size="12" font-weight="600" fill="#93670F">Need attention</text>

  <rect x="34" y="326" width="172" height="76" rx="16" fill="#FFFFFF" stroke="#E5E9F2"/>
  <text x="54" y="357" class="label">Trading Report</text>
  <text x="54" y="378" class="muted">Sales &amp; profit</text>

  <rect x="222" y="326" width="174" height="76" rx="16" fill="#FFFFFF" stroke="#E5E9F2"/>
  <text x="242" y="357" class="label">Cash Drawer</text>
  <text x="242" y="378" class="muted">Till status</text>

  <line x1="34" y1="428" x2="396" y2="428" stroke="#EEF0F4"/>

  <!-- Browse by area -->
  <text x="34" y="454" class="tiny">BROWSE BY AREA</text>

  <rect x="34" y="468" width="362" height="52" rx="15" fill="#F9FAFC" stroke="#EDF0F5"/>
  <text x="54" y="500" class="body">Sell</text>
  <text x="376" y="500" font-family="-apple-system,Inter" font-size="16" fill="#B4BCC9">:</text>

  <rect x="34" y="528" width="362" height="52" rx="15" fill="#F9FAFC" stroke="#EDF0F5"/>
  <text x="54" y="560" class="body">Stock</text>
  <text x="376" y="560" font-family="-apple-system,Inter" font-size="16" fill="#B4BCC9">:</text>

  <rect x="34" y="588" width="362" height="52" rx="15" fill="#F9FAFC" stroke="#EDF0F5"/>
  <text x="54" y="620" class="body">Money</text>
  <text x="376" y="620" font-family="-apple-system,Inter" font-size="16" fill="#B4BCC9">:</text>

  <rect x="34" y="648" width="362" height="52" rx="15" fill="#F2F6FF" stroke="#BFD0FF"/>
  <text x="54" y="680" class="body" fill="#2348B8" font-weight="800">Reports</text>
  <text x="376" y="680" font-family="-apple-system,Inter" font-size="16" fill="#2348B8">:</text>

  <rect x="34" y="708" width="362" height="52" rx="15" fill="#F9FAFC" stroke="#EDF0F5"/>
  <text x="54" y="740" class="body">People &amp; Admin</text>
  <text x="376" y="740" font-family="-apple-system,Inter" font-size="16" fill="#B4BCC9">:</text>

  <line x1="34" y1="780" x2="396" y2="780" stroke="#EEF0F4"/>

  <!-- Recent -->
  <text x="34" y="804" class="tiny">RECENT</text>
  <text x="34" y="830" class="body">Command Center</text>
  <rect x="316" y="815" width="56" height="24" rx="12" fill="#EAF0FF"/>
  <text x="328" y="831" font-family="-apple-system,Inter" font-size="10" font-weight="800" fill="#2348B8">Today</text>

  <text x="34" y="860" class="body">Sales Analytics</text>
  <rect x="326" y="845" width="46" height="24" rx="12" fill="#F1F5F9"/>
  <text x="338" y="861" font-family="-apple-system,Inter" font-size="10" font-weight="800" fill="#64748B">90d</text>

  <!-- Sign out -->
  <rect x="34" y="866" width="362" height="34" rx="14" fill="#FFFFFF" stroke="#F3D2D2"/>
  <text x="215" y="888" font-family="-apple-system,Inter" font-size="12" font-weight="800" fill="#C0392B" text-anchor="middle">Sign out</text>
</svg>
